<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Évaluation AgroecologIA — Oléiculture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
:root{--dark:#06292B;--green:#0CA536;--lime:#94C11E;--dgreen:#005E29;--magenta:#E41B8F;--bg:#f4f6f5;--card:#fff;--border:#d9e0dd;--txt:#1c2b29;--muted:#5b6b67}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);line-height:1.45}
header{position:sticky;top:0;z-index:10;background:var(--dark);color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
header .t{font-weight:600;font-size:15px}header .b{font-size:12px;background:var(--magenta);padding:3px 8px;border-radius:20px}
main{max-width:860px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin:16px 0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
h1{font-size:20px;margin:.2em 0}h2{font-size:17px;color:var(--dgreen);margin:.1em 0 .5em;border-left:4px solid var(--lime);padding-left:10px}
.step{font-weight:700;color:var(--dark);background:var(--lime);display:inline-block;padding:2px 10px;border-radius:6px;margin:.4em 0;font-size:13px}
h3{font-size:15px;margin:1em 0 .3em}.sub{font-weight:700;color:var(--dgreen);margin-top:1.1em}.muted{color:var(--muted);font-size:12.5px}
.prog{font-size:12px;color:var(--muted);margin:.3em 0}
.qbox{padding:14px;background:#eef5ef;border:1px solid var(--border);border-radius:10px;font-size:15px;font-weight:600}
.field{margin:.55em 0;font-size:14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.field label{font-weight:600}.field input[type=text]{border:none;border-bottom:1px dotted #888;min-width:120px;font:inherit;flex:1}
.opts{display:flex;gap:6px;flex-wrap:wrap}.opt{border:1px solid var(--border);border-radius:8px;padding:6px 11px;cursor:pointer;font-size:13px;background:#fff}
.opt.on{background:var(--lime);border-color:var(--dgreen);color:var(--dark);font-weight:700}
.know .opt{flex:1;min-width:90px;text-align:center}
table.nug{width:100%;border-collapse:collapse;margin-top:6px;font-size:13px}.nug th,.nug td{border:1px solid var(--border);padding:5px;text-align:center}
.nug td.tx{text-align:left}.nug td.idc{font-weight:700;color:var(--dgreen)}.nug th{background:#eef2f0;font-size:12px}
.chip{display:inline-block;width:26px;height:26px;border-radius:50%;border:2px solid #bcc7c3;cursor:pointer;vertical-align:middle}
.chip.on{background:var(--green);border-color:var(--dgreen)}.chip[data-v="R"].on{background:#c23b3b;border-color:#8f2a2a}.chip[data-v="P"].on{background:#e0a800;border-color:#a87b00;color:#3a2b00}.nug td textarea,.nm textarea{width:100%;min-height:56px;border:1px solid var(--border);border-radius:6px;font:inherit;font-size:13px;padding:6px;resize:vertical;box-sizing:border-box}
.chip.wide{width:auto;height:auto;border-radius:8px;padding:7px 10px;font-size:13px;font-weight:700;color:var(--txt)}.chip.wide.on{color:#fff}
.resp{border:1px solid var(--border);border-radius:10px;margin:10px 0;overflow:hidden}
.resp .lab{display:flex;justify-content:space-between;align-items:center;font-weight:700;color:#fff;background:var(--green);padding:8px 14px}.resp.B .lab{background:var(--dgreen)}.resp.C .lab{background:var(--magenta)}
.resp .scroll{max-height:360px;overflow:auto;padding:14px;font-size:13.5px;background:#fbfcfb}
.resp .scroll h1,.resp .scroll h2,.resp .scroll h3,.resp .scroll h4,.resp .scroll h5{color:var(--dgreen);margin:.7em 0 .2em;font-size:14px}.resp .scroll p{margin:.35em 0}.resp .scroll ul{margin:.2em 0 .2em 1.1em}.resp .scroll hr{border:none;border-top:1px dashed var(--border)}
.resp .scroll table{border-collapse:collapse;font-size:12px}.resp .scroll td,.resp .scroll th{border:1px solid var(--border);padding:4px}
.qual{margin:8px 0}.qual .c{font-weight:700;font-size:14px}.qual .d{font-size:12.5px;color:var(--muted);margin-bottom:3px}
.scalewrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.anchor{font-size:10.5px;color:var(--muted);white-space:nowrap;min-width:60px}.anchor.r{text-align:right}
.scale{display:flex;gap:4px;flex-wrap:wrap}.scale .opt{min-width:30px;text-align:center;padding:6px 7px}
.btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer}.btn.sec{background:#fff;color:var(--dgreen);border:1px solid var(--dgreen)}
.btn:disabled{opacity:.5}
.nav{display:flex;justify-content:space-between;gap:10px;margin:18px 0;flex-wrap:wrap}
.footer-rem{position:sticky;bottom:0;background:#eef2f0;border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center;padding:6px}
.nug-mobile{display:none}pre{background:var(--dark);color:#cdeccf;padding:12px;border-radius:8px;overflow:auto;font-size:12px}
.evgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:12px}
.evgrid a{display:block;text-align:center;text-decoration:none;background:var(--green);color:#fff;font-weight:700;padding:16px;border-radius:10px}
.qmenu{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.qrow{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;background:#fff}
.qrow:hover{border-color:var(--green);background:#f0faf2}.qrow .qc{font-weight:700;color:var(--green);min-width:40px}.qrow .qe{flex:1;font-size:13.5px}
.qrow .done{font-size:11px;background:var(--green);color:#fff;padding:2px 8px;border-radius:10px;white-space:nowrap}
.qrow .todo{font-size:11px;color:var(--muted);white-space:nowrap}
.addbtn{background:#fff;color:var(--dgreen);border:1px dashed var(--dgreen);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;margin-top:6px}
@media(max-width:600px){table.nug{display:none}.nug-mobile{display:block}.nm{border:1px solid var(--border);border-radius:8px;padding:10px;margin:8px 0;background:#fff}.nm .tx{font-size:13.5px;margin-bottom:8px}.nm .row{display:flex;gap:6px;flex-wrap:wrap}.nm .row .chip{flex:1;min-width:64px;text-align:center}}
</style></head><body>
<header><span class="t" id="htitle">Fiche d'évaluation · CRESI AgroecologIA</span><span class="b" id="evtag"></span></header>
<main id="app"></main>
<div class="footer-rem" id="rem"></div>

<script src="config.js"></script>
<script src="content.js"></script>
<script src="plan.js"></script>
<script>
var CFG=window.CONFIG, C=window.CONTENT;
var QIDS=Object.keys(C);
var SLOTS=["A","B","C"];
var CRIT=[["Pertinence","La réponse traite-t-elle bien du sujet ?"],
 ["Clarté","La réponse est-elle facile à comprendre ?"],
 ["Actionnabilité","Peut-on appliquer ces conseils au champ ?"],
 ["Confiance","Feriez-vous confiance pour conseiller un agriculteur ?"],
 ["Longueur","La longueur est-elle adaptée ?  (1 = trop courte · 3 = adaptée · 5 = trop longue)"]];
var COLS=[["V","Vital"],["U","Utile"],["O","Option."],["R","À retirer"]];
var NUGCOLS=[["V","Vital"],["U","Utile"],["O","Option."],["R","À retirer"],["P","Pas clair"]];
var SCALE=[1,1.5,2,2.5,3,3.5,4,4.5,5];
var MAXADD=10;
var DEFSYS=["openai_noRAG","mistral_RAG","mistral_noRAG"];
document.getElementById('htitle').textContent="Fiche d'évaluation · "+(CFG.TITRE||"AgroecologIA");

var params=new URLSearchParams(location.search);
var EV=params.get('ev'); if(EV){EV=EV.replace(/[^0-9]/g,''); if(EV.length===1)EV='0'+EV;}
if(window.PLAN&&EV&&window.PLAN[EV]&&window.PLAN[EV].order){QIDS=window.PLAN[EV].order.filter(function(q){return C[q];});}
var app=document.getElementById('app'), rem=document.getElementById('rem'), evtag=document.getElementById('evtag');
var store={}, LSKEY="";

function save(){localStorage.setItem(LSKEY,JSON.stringify(store))}
window.ta=function(el){store[el.dataset.k]=el.value;save()};
window.opt=function(el){store[el.dataset.g]=el.dataset.v;el.parentNode.querySelectorAll('.opt').forEach(function(o){o.classList.toggle('on',o===el)});save()};
window.pick=function(el){var g=el.dataset.g,v=el.dataset.v;store[g]=v;document.querySelectorAll('[data-g="'+g+'"]').forEach(function(c){c.classList.toggle('on',c.dataset.v===v)});save()};
function esc(s){return String(s).replace(/"/g,'&quot;')}
function txt(k,ph){var v=store[k]?(' value="'+esc(store[k])+'"'):'';return '<input type="text" data-k="'+k+'" oninput="ta(this)" placeholder="'+(ph||'')+'"'+v+'>'}
function tarea(k,ph){var v=store[k]?esc(store[k]):'';return '<textarea data-k="'+k+'" oninput="ta(this)" placeholder="'+(ph||'')+'">'+v+'</textarea>'}
function optset(group,vals,extra){return '<span class="opts '+(extra||'')+'">'+vals.map(function(v){return '<span class="opt'+(store[group]===v?' on':'')+'" data-g="'+group+'" data-v="'+v+'" onclick="opt(this)">'+v+'</span>'}).join('')+'</span>'}
function scale(group,low,high){return '<div class="scalewrap"><span class="anchor">'+(low||'très mauvais')+'</span><div class="scale">'
  +SCALE.map(function(v){var lab=Number.isInteger(v)?v:String(v).replace('.',',');return '<span class="opt'+(store[group]==v?' on':'')+'" data-g="'+group+'" data-v="'+v+'" onclick="opt(this)">'+lab+'</span>'}).join('')
  +'</div><span class="anchor r">'+(high||'excellent')+'</span></div>'}

function landing(){
 evtag.textContent=""; rem.textContent="";
 var btns="";for(var i=1;i<=10;i++){var n=(i<10?'0':'')+i;btns+='<a href="?ev='+n+'">Évaluateur '+n+'</a>';}
 app.innerHTML='<div class="card"><h1>Atelier d\'évaluation — '+(CFG.TITRE||'')+'</h1>'
  +'<p>Sélectionnez votre numéro d\'évaluateur (ou scannez le QR code qui vous a été remis).</p>'
  +'<div class="evgrid">'+btns+'</div></div>';
}
function setHeadFoot(extra){ evtag.textContent="Évaluateur "+EV; rem.textContent="Évaluateur "+EV+(extra?" · "+extra:"")+" · "+(CFG.ATELIER||""); }

function profil(){
 app.innerHTML='<div class="card"><h1>Fiche d\'évaluation — Évaluateur n° '+EV+'</h1>'
 +'<p class="muted">CRESI AgroecologIA — Oléiculture · 3 assistants IA comparés (A / B / C), en aveugle.</p>'
 +'<h3>■ Profil évaluateur</h3>'
 +'<div class="field"><label>Code évaluateur :</label>'+txt('p_code')+'</div>'
 +'<div class="field"><label>Sexe :</label>'+optset('p_sexe',["H","F"])+'<label>Date :</label>'+txt('p_date')+'<label>Lieu :</label>'+txt('p_lieu')+'</div>'
 +'<div class="field"><label>Structure / Organisation :</label>'+txt('p_struct')+'</div>'
 +'<div class="field"><label>Spécialité :</label>'+txt('p_spe')+'</div>'
 +'<div class="field"><label>Expérience métier :</label>'+optset('p_exp',["0 (aucune)","1 (1-5 ans)","2 (>5 ans)"])+'</div>'
 +'<div class="field"><label>Niveau de diplôme :</label>'+optset('p_dip',["Primaire","Secondaire","BTS/DUT","Licence","Master/Ing.","Doctorat"])+'</div>'
 +'<div class="field"><label>Familiarité IA :</label>'+optset('p_fam',["Jamais utilisé","Déjà essayé","Utilise régulièrement","Au privé uniquement"])+'</div>'
 +'<div class="field"><label>Si déjà utilisé l\'IA générative — Agent :</label>'+optset('p_agent',["ChatGPT","Gemini","MetaAI","Autre"])+txt('p_agent_autre','autre...')+'</div>'
 +'<div class="field"><label>Confiance IAG :</label>'+optset('p_conf',["En général oui","Tendance non","Ça dépend"])+'<label>Raison :</label>'+txt('p_conf_raison')+'</div>'
 +'<p class="muted">Choix libre : vous évaluez les questions que vous voulez, dans l\'ordre que vous voulez.</p>'
 +'<div class="nav"><span></span><button class="btn" onclick="goMenu()">Continuer →</button></div></div>';
 window.scrollTo(0,0);
}

function qDone(qid){ if(store['know_'+qid]) return true; var d=false; C[qid].nuggets.forEach(function(n){if(store['nug_'+qid+'_'+n.id])d=true;}); return d; }
function menu(){
 var rows=QIDS.map(function(qid,i){var done=qDone(qid);
   return '<div class="qrow" onclick="openQ(\''+qid+'\')"><span class="qc">'+qid+'</span><span class="qe">'+C[qid].enonce+'</span>'
   +(done?'<span class="done">✓ évaluée</span>':'<span class="todo">à évaluer</span>')+'</div>';}).join('');
 var n=QIDS.filter(qDone).length;
 app.innerHTML='<div class="card"><h1>Choisissez une question à évaluer</h1>'
  +'<p class="muted">Évaluateur n° '+EV+' · vous pouvez en évaluer autant que vous le souhaitez. Évaluées : <b>'+n+' / '+QIDS.length+'</b>.</p>'
  +'<div class="qmenu">'+rows+'</div>'
  +'<div class="nav"><button class="btn sec" onclick="go(\'profil\')">← Profil</button><button class="btn" onclick="go(\'submit\')">Terminer et envoyer ('+n+') →</button></div></div>';
 setHeadFoot("menu"); window.scrollTo(0,0);
}

function ensureMap(qid){
 if(window.PLAN&&EV&&window.PLAN[EV]&&window.PLAN[EV].abc&&window.PLAN[EV].abc[qid]){ return window.PLAN[EV].abc[qid]; }
 if(!store['map_'+qid]){ var arr=DEFSYS.slice(); for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;} store['map_'+qid]={A:arr[0],B:arr[1],C:arr[2]}; save(); }
 return store['map_'+qid];
}

function question(qid){
 var ct=C[qid], map=ensureMap(qid);
 var rows=ct.nuggets.map(function(n){return '<tr><td class="idc">'+n.id+'</td><td class="tx">'+n.t+'</td>'
   +NUGCOLS.map(function(c){var g='nug_'+qid+'_'+n.id;return '<td><span class="chip'+(store[g]===c[0]?' on':'')+'" data-g="'+g+'" data-v="'+c[0]+'" onclick="pick(this)"></span></td>'}).join('')+'</tr>'}).join('');
 var mob=ct.nuggets.map(function(n){return '<div class="nm"><div class="tx"><b>'+n.id+'</b> — '+n.t+'</div><div class="row">'
   +NUGCOLS.map(function(c){var g='nug_'+qid+'_'+n.id;return '<span class="chip wide'+(store[g]===c[0]?' on':'')+'" data-g="'+g+'" data-v="'+c[0]+'" onclick="pick(this)">'+c[1]+'</span>'}).join('')+'</div></div>'}).join('');
 var nAdd=store['addn_'+qid]||1; if(nAdd>MAXADD)nAdd=MAXADD;
 var adds='<table class="nug"><thead><tr><th>#</th><th class="tx">Information (ajout libre)</th><th>Vital</th><th>Utile</th><th>Option.</th><th>À retirer</th></tr></thead><tbody>';
 for(var i=1;i<=nAdd;i++){adds+='<tr><td class="idc">'+i+'</td><td class="tx">'+tarea('add'+i+'_'+qid+'_txt','information importante absente des nuggets...')+'</td>'
   +COLS.map(function(c){var g='add'+i+'_'+qid;return '<td><span class="chip'+(store[g]===c[0]?' on':'')+'" data-g="'+g+'" data-v="'+c[0]+'" onclick="pick(this)"></span></td>'}).join('')+'</tr>';}
 adds+='</tbody></table><div class="nug-mobile">';
 for(var j=1;j<=nAdd;j++){adds+='<div class="nm"><div class="tx"><b>'+j+'.</b> '+tarea('add'+j+'_'+qid+'_txt','information importante absente...')+'</div><div class="row">'
   +COLS.map(function(c){var g='add'+j+'_'+qid;return '<span class="chip wide'+(store[g]===c[0]?' on':'')+'" data-g="'+g+'" data-v="'+c[0]+'" onclick="pick(this)">'+c[1]+'</span>'}).join('')+'</div></div>';}
 adds+='</div>';
 if(nAdd<MAXADD)adds+='<button class="addbtn" onclick="addMore(\''+qid+'\')">+ Ajouter un élément ('+nAdd+'/'+MAXADD+')</button>';
 function qual(ab){return CRIT.map(function(c){var lo=(c[0]==='Longueur')?'trop courte':'très mauvais';var hi=(c[0]==='Longueur')?'trop longue':'excellent';
   return '<div class="qual"><div class="c">'+c[0]+'</div><div class="d">'+c[1]+'</div>'+scale('qual'+ab+'_'+qid+'_'+c[0],lo,hi)+'</div>'}).join('')}
 function respBlock(slot){return '<div class="resp '+slot+'"><div class="lab"><span>RÉPONSE '+slot+'</span></div><div class="scroll">'+marked.parse(ct.resp[map[slot]]||'')+'</div></div>'
   +'<div class="sub">Notation de la qualité — Réponse '+slot+' <span class="muted">(1 → 5)</span></div>'+qual(slot);}

 app.innerHTML='<div class="card"><div class="prog">'+qid+'</div><h2>Question</h2><div class="qbox">'+ct.enonce+'</div>'
 +'<div class="sub">Votre connaissance de CE sujet <span class="muted">(une seule case)</span></div>'+optset('know_'+qid,["Pas mon domaine","Quelques notions","Bonne maîtrise","Expert / référent"],"know")+'</div>'
 +'<div class="card"><span class="step">Étape 1 — Grille des nuggets</span><p class="muted">Cochez <b>une seule case par ligne</b> : Vital · Utile · Optionnel · À retirer (redondant / hors-sujet / faux) · Pas clair.</p>'
 +'<table class="nug"><thead><tr><th>ID</th><th class="tx">Information (nugget)</th><th>Vital</th><th>Utile</th><th>Option.</th><th>À retirer</th><th>Pas clair</th></tr></thead><tbody>'+rows+'</tbody></table><div class="nug-mobile">'+mob+'</div>'
 +'<div class="sub">■ Ajouts libres — informations importantes absentes des nuggets</div><p class="muted">Ajoutez les éléments manquants (jusqu\'à '+MAXADD+'), et cochez une case par ajout : Vital · Utile · Optionnel · À retirer.</p>'+adds+'</div>'
 +'<div class="card"><span class="step">Étape 2 — Lecture et notation des trois réponses (A, B et C, ordre tiré au sort)</span>'
 +respBlock('A')+respBlock('B')+respBlock('C')+'</div>'
 +'<div class="nav"><button class="btn sec" onclick="go(\'menu\')">← Retour au menu</button><button class="btn" onclick="go(\'menu\')">Valider et revenir au menu ✓</button></div>';
 setHeadFoot(qid); window.scrollTo(0,0);
}
window.addMore=function(qid){var n=store['addn_'+qid]||1;store['addn_'+qid]=Math.min(MAXADD,n+1);save();question(qid);};
window.openQ=function(qid){question(qid);};

function submitScreen(){
 var done=QIDS.filter(qDone);
 app.innerHTML='<div class="card"><h1>Envoi de vos évaluations</h1>'
 +'<p>Vous avez évalué <b>'+done.length+'</b> question(s) : '+(done.join(', ')||'aucune')+'.</p>'
 +'<p class="muted">Vous pouvez revenir au menu pour en évaluer d\'autres, ou envoyer maintenant.</p>'
 +'<div id="sendmsg"></div>'
 +'<div class="nav"><button class="btn sec" onclick="go(\'menu\')">← Retour au menu</button><button class="btn" id="sendbtn" onclick="sendData()"'+(done.length?'':' disabled')+'>Envoyer mes réponses ✓</button></div></div>';
 setHeadFoot("envoi"); window.scrollTo(0,0);
}
function buildPayload(){
 var prof={};["p_code","p_sexe","p_date","p_lieu","p_struct","p_spe","p_exp","p_dip","p_fam","p_agent","p_agent_autre","p_conf","p_conf_raison"].forEach(function(k){prof[k]=store[k]||""});
 var qs=QIDS.filter(qDone).map(function(qid){var map=ensureMap(qid);
   var nug={};C[qid].nuggets.forEach(function(n){nug[n.id]=store['nug_'+qid+'_'+n.id]||""});
   var adds=[];for(var i=1;i<=MAXADD;i++){if(store['add'+i+'_'+qid+'_txt'])adds.push({texte:store['add'+i+'_'+qid+'_txt'],niveau:store['add'+i+'_'+qid]||''})}
   var out={qid:qid,connaissance:store['know_'+qid]||"",nuggets:nug,ajouts_libres:adds};
   SLOTS.forEach(function(slot){var q={};CRIT.forEach(function(c){q[c[0]]=store['qual'+slot+'_'+qid+'_'+c[0]]||''});
     out['qualite_'+slot]=q; out['systeme_'+slot]=map[slot]; out['id_'+slot]=(C[qid].respId||{})[map[slot]]||"";});
   return out;});
 return {atelier:CFG.ATELIER,evaluateur:EV,horodatage:new Date().toISOString(),profil:prof,questions:qs};
}
window.sendData=function(){
 var payload=buildPayload();
 var msg=document.getElementById('sendmsg'), btn=document.getElementById('sendbtn');
 if(!CFG.ENDPOINT){msg.innerHTML='<pre>'+JSON.stringify(payload,null,2).replace(/</g,'&lt;')+'</pre><p class="muted">(Aucun ENDPOINT configuré : aperçu de ce qui serait envoyé.)</p>';return;}
 btn.disabled=true; msg.innerHTML='<p>Envoi en cours…</p>';
 var body=JSON.stringify(payload);
 fetch(CFG.ENDPOINT,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain;charset=utf-8"},body:body})
  .then(function(r){return r.text().then(function(t){try{var j=JSON.parse(t);if(j.ok)return true;}catch(e){} throw new Error("Réponse inattendue");});})
  .then(function(){store._submitted=new Date().toISOString();save();app.innerHTML='<div class="card"><h1>Merci, c\'est envoyé ✅</h1><p>Vos évaluations ont été transmises. Une copie reste en mémoire locale.</p></div>';})
  .catch(function(err){
   btn.disabled=false;
   msg.innerHTML='<p style="color:#c23b3b">Échec de l\'envoi ('+err.message+'). Vos réponses sont conservées.</p>'
    +'<p>Téléchargez une copie de sauvegarde et envoyez-la par e-mail à <b>naudin@cirad.fr</b> :</p>'
    +'<button class="btn sec" onclick="dlBackup()">Télécharger la sauvegarde (.json)</button>';
  });
}
window.dlBackup=function(){
 var payload=buildPayload();
