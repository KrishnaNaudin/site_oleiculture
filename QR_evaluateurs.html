<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<title>QR évaluateurs — AgroecologIA Oléiculture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body{font-family:system-ui,sans-serif;margin:18px;color:#06292B}
h1{font-size:18px;color:#005E29}
.bar{margin:10px 0;font-size:13px}.bar input{font:inherit;width:60%;padding:6px;border:1px solid #94C11E;border-radius:6px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:12px}
.c{border:2px solid #94C11E;border-radius:12px;padding:12px;text-align:center;break-inside:avoid}
.n{font-weight:700;font-size:16px;margin-bottom:6px}
.u{font-size:10px;color:#5b6b67;word-break:break-all;margin-top:6px}
@media print{.bar{display:none}.grid{grid-template-columns:repeat(2,1fr)}}
</style></head><body>
<h1>Atelier AgroecologIA — Oléiculture · QR codes évaluateurs</h1>
<div class="bar">URL publiée du site (sans <code>?ev=</code>) :
<input id="base" value="https://VOTRECOMPTE.github.io/eval-oleiculture/" oninput="render()"></div>
<p style="font-size:12px">Chaque évaluateur scanne son QR → son formulaire s'ouvre directement. Modifiez l'URL ci-dessus puis imprimez (Ctrl+P).</p>
<div class="grid" id="grid"></div>
<script>
function render(){
  var base=document.getElementById('base').value.replace(/\/?$/,'/');
  var g=document.getElementById('grid'); g.innerHTML='';
  for(var i=1;i<=10;i++){var n=(i<10?'0':'')+i; var url=base+'?ev='+n;
    var d=document.createElement('div'); d.className='c';
    d.innerHTML='<div class="n">Évaluateur '+n+'</div><div id="q'+n+'"></div><div class="u">'+url+'</div>';
    g.appendChild(d);
    new QRCode(document.getElementById('q'+n),{text:url,width:180,height:180});
  }
}
render();
</script></body></html>
